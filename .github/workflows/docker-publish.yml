name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag override (e.g. 3.4.9)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and Push Docker (multi-arch)
    runs-on: ubuntu-latest
    outputs:
      ghcr_image: ${{ steps.meta.outputs.ghcr_image }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && format('refs/tags/v{0}', inputs.version) || github.ref }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image metadata
        id: meta
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          set -euo pipefail

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/${REPO_LC}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION_TAG="${{ inputs.version }}"
            VERSION_TAG="${VERSION_TAG#v}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME#v}"
          else
            VERSION_TAG="sha-${GITHUB_SHA::7}"
          fi

          TAGS="${GHCR_IMAGE}:${VERSION_TAG}"$'\n'"${GHCR_IMAGE}:latest"

          if [ -n "${DOCKERHUB_REPOSITORY}" ]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_REPOSITORY}:${VERSION_TAG}"$'\n'"${DOCKERHUB_REPOSITORY}:latest"
          fi

          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          printf 'tags<<EOF\n%s\nEOF\n' "${TAGS}" >> "$GITHUB_OUTPUT"

          echo "Primary image: ${GHCR_IMAGE}:${VERSION_TAG}"

      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_REPOSITORY != '' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version_tag }}"

      - name: Update Docker Hub description
        if: ${{ vars.DOCKERHUB_REPOSITORY != '' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_REPOSITORY }}
          short-description: "OmniRoute — Unified AI proxy. Route any LLM through one endpoint."
          readme-filepath: ./README.md
